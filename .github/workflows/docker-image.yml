name: Build and publish Docker images

on:
  push:
    branches: ['main']

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run tests
        run: dotnet test --no-build --verbosity normal

  build-and-push-images:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current timestamp
        id: timestamp
        run: echo "timestamp=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pennypincher-api
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.timestamp.outputs.timestamp }}

      - name: Extract metadata (WebApp)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/pennypincher-web
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.timestamp.outputs.timestamp }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: PennyPincher.Api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Build and push WebApp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: PennyPincher.WebApp/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

      - name: Trigger watchtower
        run: curl -X POST -H ${{ secrets.WATCHTOWER_AUTH_HEADER }} ${{ secrets.WATCHTOWER_URL }}
